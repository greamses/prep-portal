    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#0055ff" />

    <meta
      name="description"
      content="Prep Portal 2026: The ultimate exam preparation hub featuring 50+ practice papers, 1000+ questions across 30+ subjects. Access WAEC, NECO, JAMB, Cambridge past papers, theory drills, worked solutions, and comprehensive revision kits for national, international, and competition exams. Boost your grades with structured archives, interactive papers, and real-time scoring for Common Entrance, Scholastic Prep, TULIP Questions, and more. Your all-in-one academic success platform for 2026."
    />
    <meta
      name="keywords"
      content="exam preparation, past papers, WAEC, NECO, JAMB, Cambridge, theory drills, practice questions, revision kits, competition exams, scholastic prep, common entrance, study resources, 2026 exams, mathematics, english, science, social studies"
    />
    <meta name="author" content="Prep Portal" />
    <meta name="robots" content="index, follow" />
    <meta
      property="og:title"
      content="Prep Portal | 2026 Exam Archives & Theory Drills"
    />
    <meta
      property="og:description"
      content="Your curated vault of past papers, worked solutions, and prep kits for WAEC, Cambridge, SAT, and more. Start revising now!"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Prep Portal | 2026 Exam Success Hub" />
    <meta
      name="twitter:description"
      content="Access 1000+ exam questions, subject drills, and instant feedback. Raise your grade with Prep Portal."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="/home/css/main.css" />
    <link rel="stylesheet" href="/utils/components/nav.css" />
    <link rel="stylesheet" href="/home/css/login.css" />
  </head>

  <body>
    <!-- ═══ ADVANCED TRI-CORE LOADER ═══ -->

    <div id="loader">
      <div id="loader-wrapper">
        <div class="logo-cluster"></div>
        <!-- JS will inject the 3 images here -->
      </div>
      <div class="loader-word"><span>Portal</span></div>
      <!--     <div class="loader-word"><span>Portal.</span></div> -->

      <div class="loader-bar"></div>
    </div>

    <nav class="site-nav" data-nav="main"></nav>

    <!-- ═════════════════════════════════════
     HERO SECTION — NEW CONCEPT
     Dashboard / Tutor Workspace Style
═════════════════════════════════════ -->
    <section class="hero">
      <div class="hero-container">
        <!-- LEFT SIDE -->
        <div class="hero-content">
          <h1 class="hero-title">Professional Tutors.</h1>

          <p class="hero-description">Personalized support for students.</p>

          <!-- CTA -->
          <div class="hero-actions">
            <a
              href="#book"
              class="hero-btn hero-btn-primary"
              data-auth-open="login"
            >
              <span>Book Now</span>

              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M5 12H19"></path>
                <path d="M12 5L19 12L12 19"></path>
              </svg>
            </a>
          </div>

          <!-- TRUST ITEMS -->
        </div>

        <!-- RIGHT SIDE -->
        <div class="hero-visual">
          <!-- MAIN DASHBOARD -->
          <div class="dashboard-window">
            <!-- Window Top -->
            <div class="window-top">
              <div class="window-dots">
                <span></span>
                <span></span>
                <span></span>
              </div>

              <div class="window-label">Student Dashboard</div>
            </div>

            <!-- Window Body -->
            <div class="window-body">
              <!-- SIDEBAR -->
              <div class="dashboard-sidebar">
                <div class="sidebar-logo">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>

                    <path d="M6.5 2H20V20H6.5A2.5 2.5 0 0 1 4 17.5Z"></path>
                  </svg>
                </div>

                <div class="sidebar-lines">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </div>

              <!-- MAIN PANEL -->
              <div class="dashboard-main">
                <!-- TOP CARD -->
                <div class="dashboard-card dashboard-card-lg">
                  <div class="card-heading">Mathematics</div>

                  <div class="progress-wrap">
                    <div class="progress-bar">
                      <div class="progress-fill"></div>
                    </div>

                    <span>82%</span>
                  </div>

                  <div class="mini-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                </div>

                <!-- LOWER GRID -->
                <div class="dashboard-grid">
                  <!-- CARD -->
                  <div class="dashboard-card">
                    <div class="icon-box icon-yellow">
                      <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M12 20V10"></path>
                        <path d="M18 20V4"></path>
                        <path d="M6 20v-6"></path>
                      </svg>
                    </div>

                    <strong>Weekly Tests</strong>
                  </div>

                  <!-- CARD -->
                  <div class="dashboard-card">
                    <div class="icon-box icon-blue">
                      <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M9 11L12 14L22 4"></path>

                        <path
                          d="M21 12V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H16"
                        ></path>
                      </svg>
                    </div>

                    <strong>Assignments</strong>
                  </div>

                  <!-- CARD -->
                  <div class="dashboard-card">
                    <div class="icon-box icon-green">
                      <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="12" cy="12" r="10"></circle>
                        <polygon points="10 8 16 12 10 16 10 8"></polygon>
                      </svg>
                    </div>

                    <strong>Video Lessons</strong>
                  </div>

                  <!-- CARD -->
                  <div class="dashboard-card">
                    <div class="icon-box icon-red">
                      <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M8 21H16"></path>

                        <path d="M12 17V21"></path>

                        <path d="M7 4H17"></path>

                        <path d="M17 4V10A5 5 0 0 1 7 10V4"></path>
                      </svg>
                    </div>

                    <strong>Exam Prep</strong>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- FLOATING NOTE -->
          <div class="floating-note">
            <div class="note-top">Parent Update</div>

            <div class="note-body">
              <div class="note-line"></div>
              <div class="note-line short"></div>

              <div class="note-success">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M20 6L9 17L4 12"></path>
                </svg>

                <span>Improved Performance</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="log-in"></div>

    <div id="prepbot"></div>
    <script src="/utils/components/loader.js"></script>
    <script src="/utils/components/nav-builder.js" type="module"></script>
    <script src="/home/js/auth-modal.js" type="module"></script>
    <script>
      if ("serviceWorker" in navigator) {
        // Listen for the new service worker taking control of the page
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
