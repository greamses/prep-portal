<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Decks — Recall Press</title>
    <meta name="description" content="Every flashcard deck you've printed, sorted into five Leitner review boxes — open a due box to move its cards closer to permanent recall." />

    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
    <meta name="theme-color" content="#b8a8e8" />

    <link
      href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@500;600;700&family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/utils/components/theme.css" />
    <link rel="stylesheet" href="/utils/components/nav.css" />
    <link rel="stylesheet" href="/utils/components/components.css" />
    <link rel="stylesheet" href="/utils/components/select.css" />
    <link rel="stylesheet" href="./style.css" />

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
        }
      }
    </script>
    <script type="module" src="/utils/auth/premium-guard.js"></script>
      <link rel="stylesheet" href="/utils/components/sticky-ui.css" />
  </head>

  <body>
    <nav class="site-nav" data-nav="main"></nav>

    <div class="builder-paint" aria-hidden="true"></div>

    <!-- ═══ HERO ═══ -->
    <header class="builder-header">
      <div class="cards-tabs" role="tablist">
        <a class="pp-pill cards-tab is-active" href="/flashcards/library.html" role="tab">My Decks</a>
        <a class="pp-pill cards-tab" id="library-new-deck" href="/flashcards/index.html" role="tab" hidden>Print &amp; Edit</a>
        <a class="pp-pill cards-tab" href="/flashcards/facts.html" role="tab">Facts</a>
      </div>
    </header>

    <!-- ═══ YOUR DECKS ═══ -->
    <section class="decks-section">
      <div class="press-section-hdr">
        <div class="setup-eyebrow">Your Shelf</div>
        <h2>Decks &amp; Review Boxes</h2>
        <p class="press-section-sub">Cards move through five drawers as you remember them better.</p>
      </div>

      <div class="deck-grid" id="deck-grid">
        <p class="deck-empty" id="deck-empty">No decks yet — print your first one above.</p>
      </div>
    </section>

    <!-- ═══ REVIEW OVERLAY ═══ -->
    <div class="review-bd" id="review-bd" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="review-wrap">
        <div class="review-hdr">
          <span class="review-subject" id="review-subject"></span>
          <span class="review-progress" id="review-progress"></span>
          <button class="review-close" id="review-close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div class="review-stage">
          <div class="card-nav-row">
            <button class="card-nav-arrow" id="review-prev" type="button" aria-label="Previous card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="flash-card pp-receipt" id="flash-card">
              <span class="pp-sticky pp-sticky--tape flash-subject" id="flash-subject"></span>
              <span class="pp-sticky pp-sticky--tape flash-note" id="flash-note"></span>
              <div class="flash-card-inner">
                <div class="flash-face flash-front pp-receipt__paper">
                  <div class="flash-blob flash-blob--front" aria-hidden="true"></div>
                  <div class="flash-icon-wrap" id="flash-icon-wrap-front">
                    <span class="flash-icon-tile" aria-hidden="true"></span>
                    <span class="flash-icon" id="flash-icon-front"></span>
                  </div>
                  <div class="flash-photo pp-sticky pp-sticky--tape" id="flash-photo-front" hidden>
                    <img class="flash-image" id="flash-image-front" alt="" />
                  </div>
                  <p class="flash-text" id="flash-front-text"></p>
                  <span class="flash-flip-hint" id="flash-flip-hint" aria-hidden="true"></span>
                </div>
                <div class="flash-face flash-back pp-receipt__paper">
                  <div class="flash-blob flash-blob--back" aria-hidden="true"></div>
                  <div class="flash-icon-wrap" id="flash-icon-wrap-back">
                    <span class="flash-icon-tile" aria-hidden="true"></span>
                    <span class="flash-icon" id="flash-icon-back"></span>
                  </div>
                  <div class="flash-photo pp-sticky pp-sticky--tape" id="flash-photo-back" hidden>
                    <img class="flash-image" id="flash-image-back" alt="" />
                  </div>
                  <p class="flash-text" id="flash-back-text"></p>
                </div>
              </div>
              <div class="review-grades" id="review-grades" hidden>
                <div class="grade-flyout" id="grade-flyout">
                  <button class="grade-btn grade-again" data-grade="again" title="Again"><span class="grade-icon" id="grade-icon-again"></span></button>
                  <button class="grade-btn grade-hard" data-grade="hard" title="Hard"><span class="grade-icon" id="grade-icon-hard"></span></button>
                  <button class="grade-btn grade-easy" data-grade="easy" title="Easy"><span class="grade-icon" id="grade-icon-easy"></span></button>
                </div>
                <button class="grade-btn grade-good grade-trigger" data-grade="good" title="Good"><span class="grade-icon" id="grade-icon-good"></span></button>
              </div>
            </div>
            <button class="card-nav-arrow" id="review-next" type="button" aria-label="Next card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>

        <div class="review-done" id="review-done" hidden>
          <p>Box cleared.</p>
          <button class="btn-ghost" id="review-done-close">Back</button>
        </div>
      </div>
    </div>

    <script src="/utils/components/nav-builder.js" type="module"></script>
    <script type="module" src="./js/library.js"></script>

    <script type="module">
      import { heroPaint } from "/utils/components/nav-icons.js";
      document.querySelectorAll(".builder-paint").forEach((el) => (el.innerHTML = heroPaint()));
    </script>
  </body>
</html>
