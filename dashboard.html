<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prep Portal 2026 | Dashboard</title>

    <link

      type="image/svg+xml"

    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#0055ff" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="/utils/components/nav.css" />
    <link rel="stylesheet" href="/utils/components/select.css" />
    <link rel="stylesheet" href="/home/css/login.css" />
    <link rel="stylesheet" href="/user-dashboard.css" />
  </head>

  <body>
    <div id="loader">
      <div id="loader-wrapper">
        <div class="logo-cluster"></div>
      </div>
      <div class="loader-word"><span>Dashboard</span></div>
      <div class="loader-bar"></div>
    </div>

    <nav class="site-nav" data-nav="main"></nav>

    <main
      class="user-dashboard"
      id="dashboard"
      aria-labelledby="dashboard-title"
    >
      <div class="dashboard-shell">
        <!-- ── Header ── -->
        <div class="dashboard-header">
          <div>
            <p class="dashboard-kicker" id="dashboard-role-kicker">
              My Workspace
            </p>
            <h1 id="dashboard-title">
              Welcome back, <span data-dashboard-name>there</span>.
            </h1>
            <p class="dashboard-subtitle" data-dashboard-subtitle>
              Loading your workspace...
            </p>
          </div>
          <div class="dashboard-account">
            <div class="dashboard-avatar" data-dashboard-avatar></div>
            <div>
              <span data-dashboard-plan>Free</span>
              <strong data-dashboard-status>Checking account</strong>
            </div>
          </div>
        </div>

        <!-- ── Toolbar (injected by JS per role) ── -->
        <div
          class="dashboard-toolbar"
          id="dashboard-toolbar"
          aria-label="Dashboard actions"
        ></div>

        <!-- ── Role panels (injected by JS) ── -->
        <div class="dashboard-layout" id="dashboard-layout" data-role="loading">
          <div class="db-placeholder">
            <div class="db-spinner"></div>
          </div>
        </div>
      </div>
    </main>

    <div class="log-in"></div>
    <div id="prepbot"></div>

    <script src="/utils/components/loader.js"></script>
    <script src="/utils/components/nav-builder.js" type="module"></script>
    <script src="/home/js/auth-modal.js" type="module"></script>
    <script src="/payment-manager.js" type="module"></script>
    <script type="module" src="/home/js/dashboard/dashboard.js"></script>
  </body>
</html>
