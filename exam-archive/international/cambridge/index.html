<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge Math Assessment</title>
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="./style.css">
    
    <!-- MathJax for rendering LaTeX math formulas -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
</head>

<body>
    
    <main class="quiz-container">
        <form id="quiz-form">
            <div id="questions-grid">
                <!-- JavaScript will inject cards here -->
            </div>
            
            <div class="submit-area">
                <button type="submit" id="submit-btn">Submit</button>
                <div id="score-display"></div>
            </div>
        </form>
    </main>
    
    <!-- Main Application Script (Module) -->
    <script type="module" src="./script.js"></script>
</body>

</html>
