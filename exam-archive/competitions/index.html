<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Archive | Prep Portal 2026</title>
  
  
    <link rel="icon" type="image/svg+xml" href="../logo/logo-icon.svg">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../../main.css">
  <script src="../../utils/loader/loader.js"></script>
  
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
</head>

<body>
  
  <!-- ═══ ADVANCED TRI-CORE LOADER ═══ -->
  <div id="loader">
    <div id="loader-wrapper">
      <div class="logo-cluster">
        <img src="../../logo/logo-loading.svg" class="pulse-logo" alt="Loading...">
        <img src="../../logo/logo-loading.svg" class="pulse-logo" alt="Loading...">
        <img src="../../logo/logo-loading.svg" class="pulse-logo" alt="Loading...">
      </div>
    </div>
    
    <div class="loader-word"><span>Race IT</span></div>
    <div class="loader-bar"></div>
  </div>
  
  <!-- NAVIGATION -->
  <nav class="site-nav">
    <a href="/" class="nav-logo">
      <!-- Icon -->
      <img src="../../logo/logo-light.svg" alt="PrepPortal logo" />
      
      <!-- Stacked Text Branding -->
      <div class="logo-brand">
        <span class="brand-top">Prep</span>
        <span class="brand-bottom">Portal</span>
      </div>
    </a>
    
    <ul class="nav-links" id="nav-links"></ul>
    
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  
  <!-- TICKER -->
  <div class="ticker" aria-hidden="true">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
  
  <!-- HERO -->
  <div class="hero">
    <div class="hero-left">
      <h1 class="hero-title" id="main-title">Comp.<br>Trainer</h1>
    </div>
    <div class="hero-right">
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </div>
  
  <!-- EXAM ARCHIVES SECTION -->
  <div class="section-header" id="exams">
    <h2 id="exams-title">Available Examinations</h2>
    <span id="exams-subtitle">Browse · Practice · Master</span>
  </div>
  
  <main class="main-content">
    <div class="category-grid" id="category-grid"></div>
  </main>
  
  <!-- ABOUT SECTION -->
  <section class="info-strip" id="info-strip"></section>
  
  <!-- CTA BAND -->
  <section class="cta-band reveal">
    <h2 id="cta-title">Ready to <em>ace your exam?</em></h2>
    <a href="#exams" class="cta-btn" id="cta-btn">Start Practicing →</a>
  </section>
  
  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-top">
      <div class="footer-brand">
        <span class="footer-logo">Prep<span>Portal</span></span>
        <p id="footer-description"></p>
      </div>
    </div>
    <div class="footer-bottom">
      <p id="copyright"></p>
      <div class="footer-links" id="footer-links"></div>
    </div>
  </footer>
  
    <div id="prepbot"></div>
  <script type="module" src="/utils/prepbot/prepbot.js"></script>
  
  <script src="./data.js"></script>
  <script src="../../main.js"></script>
</body>

</html>
