<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholastic Prep | Prep Portal 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../../../main.css">
    <link rel="stylesheet" href="../../../../utils/chatbot/chatbot.css">
    <link rel="stylesheet" href="../../../../utils/loader/loader.css">
    
    <script id="MathJax-script" async src="/node_modules/mathjax/tex-mml-chtml.js"></script>
</head>

<body>
    
    <!-- ═══ LOADER ═══ -->
    <div id="loader">
        <div class="loader-word"><span>Practice</span></div>
        <div class="loader-word"><span>Years.</span></div>
        <div class="loader-bar"></div>
    </div>
    
    <div class="scroll-hint">Scroll</div>
    
    <!-- ═══ NAVIGATION ═══ -->
    <nav class="site-nav">
        <a href="../index.html" class="nav-logo">Prep<span>Portal</span></a>
        <ul class="nav-links" id="nav-links"></ul>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>
    
    <!-- ═══ TICKER ═══ -->
    <div class="ticker" aria-hidden="true">
        <div class="ticker-track" id="ticker-track"></div>
    </div>
    
    <!-- ═══ HERO SECTION ═══ -->
    <div class="hero">
        <div class="hero-left">
            <h1 class="hero-title" id="main-title">Practice<br>Years.</h1>
        </div>
        <div class="hero-right">
            <p class="hero-tagline" id="hero-tagline"></p>
            <div class="hero-stats" id="hero-stats"></div>
        </div>
    </div>
    
    <!-- ═══ FEATURED BAND ═══ -->
    <div class="featured-band reveal">
        <div class="featured-label"><span>Live&nbsp;&nbsp;Now</span></div>
        <div class="featured-cards" id="featured-cards"></div>
    </div>
    
    <!-- ═══ SECTION HEADER ═══ -->
    <div class="section-header" id="categories">
        <h2 id="categories-title">Competition Years</h2>
        <span id="categories-subtitle">2021 · 2022 · 2023 · 2024 · 2025</span>
    </div>
    
    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-content">
        <div class="category-grid" id="category-grid"></div>
    </main>
    
    <!-- ═══ INFO STRIP ═══ -->
    <section class="info-strip" id="info-strip"></section>
    
    <!-- ═══ CTA BAND ═══ -->
    <section class="cta-band reveal">
        <h2 id="cta-title">Ready to <em>compete at the top?</em></h2>
        <a href="#categories" class="cta-btn" id="cta-btn">Start with 2025 →</a>
    </section>
    
    <!-- ═══ FOOTER ═══ -->
    <footer class="site-footer">
        <div class="footer-top">
            <div class="footer-brand">
                <span class="footer-logo">Prep<span>Portal</span></span>
                <p id="footer-description"></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p id="copyright"></p>
            <div class="footer-links" id="footer-links"></div>
        </div>
    </footer>
    
    <!-- ═══ CHATBOT ═══ -->
    <div id="prepbot"></div>
    <script src="../../../../utils/chatbot/chatbot.js"></script>
    
    <script src="../years.js"></script>
    <script src="../../../../main.js"></script>
    <script src="../../../../utils/loader/loader.js"></script>
    
</body>

</html>
