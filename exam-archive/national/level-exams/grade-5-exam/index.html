<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drills</title>
    
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- MathJax for Math Formatting -->
    <script id="MathJax-script" async src="/node_modules/mathjax/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="../../../style.css">
    
    <link rel="stylesheet" href="../../../../chatbot/chatbot.css">
</head>

<body>
    
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="title-group">
                <span class="material-symbols-outlined" style="color: #ea4335;"></span>
                Drills
            </div>
            <div class="header-controls">
                <div class="score-tracker">
                    <span class="score-pill score-correct"><span class="material-symbols-outlined"></span> <span id="correct-count">0</span></span>
                    <span class="score-pill score-wrong"><span class="material-symbols-outlined"></span> <span id="wrong-count">0</span></span>
                </div>
                <div class="timer-badge">
                    <span class="material-symbols-outlined"></span>
                    <span id="timer-display">60:00</span>
                </div>
            </div>
        </div>
        
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <input type="range" id="q-slider" min="1" max="1" value="1">
            <input type="number" id="q-input" min="1" max="1" value="1">
            <div class="q-counter"><span id="current-q-text">1</span> / <span id="total-q-text">0</span></div>
        </div>
        
        <!-- Unanswered Dots Container -->
        <div class="unanswered-dots-container" id="unanswered-dots">
            <!-- Dots rendered via JS -->
        </div>
        
        <!-- Question -->
        <div class="question-area">
            <div class="question-num"><span id="q-number-display">1</span>.</div>
            <div class="question-body">
                <div class="question-text" id="question-text">Loading question...</div>
                <img id="question-image" class="question-image hidden" src="" alt="Question illustration">
            </div>
        </div>
        
        <!-- Options -->
        <div class="options-container" id="options-container">
            <!-- Options generated by JS -->
        </div>
        
        <!-- Hint -->
        <div class="hint-container" id="hint-container">
            <button class="hint-btn" onclick="toggleHint()">
                Show hint <span class="material-symbols-outlined" id="hint-icon"></span>
            </button>
            <div class="hint-content hidden" id="hint-content">
                <span class="material-symbols-outlined" style="color: #fbbc04;"></span>
                <div id="hint-text"></div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer-controls">
            <button class="btn btn-outline" id="btn-prev" onclick="changeQuestion(-1)">Back</button>
            <button class="btn btn-primary" id="btn-next" onclick="changeQuestion(1)">Next</button>
        </div>
    </div>
    <!-- ═══ PREPBOT ═══ -->
    <div id="prepbot"></div>
    <script src="./main.js" type="module"></script>
    <script src="../../../../chatbot/chatbot.js"></script>
</body>

</html>
