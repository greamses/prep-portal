<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prep Portal — Practice Paper</title>
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo/logo-light.svg" />
    <meta name="theme-color" content="#0055ff" />
    
    <link rel="stylesheet" href="./question.css">
    
    <!-- MathJax 3 — $...$ inline, $$...$$ display -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: true
            },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
            startup: { typeset: false }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js" async></script>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
        }
      }
    </script>
</head>

<body>

    <!-- Organic paint blobs behind the page (same splash as the home hero) -->
    <div class="page-paint" aria-hidden="true"></div>

    <!-- ── QUIZ SCREEN ──────────────────────────────────────── -->
    <div class="quiz-shell" id="quiz-screen">
        
        <div class="exam-header">
            <div>
                <div class="exam-eyebrow">Prep Portal &middot; </div>
                <h1 id="display-subject">Loading&hellip;</h1>
            </div>
            <div class="exam-meta" id="display-meta">—</div>
        </div>
        
        <div id="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading questions&hellip;</p>
        </div>

        <div class="question-card" id="question-card" style="display:none">
            <span class="card-note card-note--counter" id="q-counter-label">Q — / —</span>
            <span class="card-note card-note--timer" id="timer-display" aria-live="polite">--:--</span>
            <div class="q-text" id="q-text"></div>
            <div id="q-image-wrap"></div>
            <div id="q-options"></div>
        </div>

        <div class="q-dots-row">
            <div class="q-dots" id="q-dots"></div>
        </div>

        <div class="feedback-strip" id="feedback-strip">
            <span class="feedback-label" id="feedback-label"></span>
            <div id="feedback-expl"></div>
            <div class="feedback-actions" id="feedback-actions"></div>
        </div>
        
        <div class="nav-bar" id="nav-bar" style="display:none">
            <div class="nav-left">
                <a href="#" class="quit-link" id="quit-link">← Quit</a>
            </div>
            <div class="nav-mid">
                <button class="btn" id="prev-btn" onclick="Quiz.navigate(-1)" disabled>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M8 1L3 6l5 5" />
                    </svg>
                    Prev
                </button>
            </div>
            <div class="nav-right">
                <button class="btn btn-yellow" id="next-btn" onclick="Quiz.navigate(1)">
                    Next
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M4 1l5 5-5 5" />
                    </svg>
                </button>
                <button class="btn btn-ink" id="submit-btn" onclick="Quiz.confirmSubmit()" style="display:none">
                    Submit
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 6h8M7 3l3 3-3 3" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- ── RESULTS SCREEN ───────────────────────────────────── -->
    <div class="quiz-shell" id="results-screen" style="display:none;flex-direction:column;">
        
        <div class="print-header" id="print-header">Prep Portal &middot; WASSCE — Results</div>
        
        <div class="results-header">
            <div class="eyebrow">Exam Complete</div>
            <div class="score-display" id="res-score">—</div>
            <div class="score-label" id="res-grade">—</div>
        </div>
        
        <div class="results-grid">
            <div class="res-stat green"><strong id="res-correct">0</strong><span>Correct</span></div>
            <div class="res-stat red"> <strong id="res-wrong">0</strong> <span>Wrong</span></div>
            <div class="res-stat"> <strong id="res-skipped">0</strong><span>Skipped</span></div>
        </div>
        
        <div class="review-list" id="review-list"></div>
        
        <div class="results-actions no-print">
            <button class="btn" onclick="window.history.back()">← Back</button>
            <button class="btn btn-yellow" onclick="Quiz.retake()">Retake</button>
            <button class="btn btn-ink" onclick="Quiz.print()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="8" height="6" />
                    <path d="M4 4V1h4v3M4 8h4" />
                </svg>
                Print
            </button>
        </div>
    </div>
    
    <!-- ── PREPBOT MOUNT ─────────────────────────────────────── -->
    <div id="prepbot"></div>
    
    <!-- ── CONFIRM MODAL ─────────────────────────────────────── -->
    <div id="pp-confirm-overlay">
        <div class="pp-confirm-box">
            <div class="pp-confirm-title">Submit Paper?</div>
            <p class="pp-confirm-body" id="confirm-body"></p>
            <div class="pp-confirm-ftr">
                <button class="btn" onclick="Quiz.closeConfirm()">Go Back</button>
                <button class="btn btn-ink" onclick="Quiz.submit()">Yes, Submit</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="../../../firebase-init.js"></script>
    <script src="./js/config-helpers.js"></script>
    <script src="./js/api-services.js"></script>
    <script src="./js/quiz-engine.js"></script>
    <script type="module" src="/utils/prepbot/prepbot.js"></script>
    <script src="./js/video-player.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/timer.js"></script>
    <script src="./js/keyboard.js"></script>

    <script type="module">
      import { heroPaint } from "/utils/components/nav-icons.js";
      const p = document.querySelector(".page-paint");
      if (p) p.innerHTML = heroPaint();
    </script>
</body>

</html>
