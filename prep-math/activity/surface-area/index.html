<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surface Area — 3D to 2D Nets</title>

    <!-- Page access gate: feature "prep-math-activities", part "surface-area" -->
    <script type="module" src="/utils/auth/premium-guard.js"></script>
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
    <meta name="theme-color" content="#f4c95d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/utils/components/nav.css" />
    <style>
      /* =========================================================
         Surface Area explorer — soft-UI skin matching the home page.
         All colour / shadow tokens come from theme.css (via nav.css).
         ========================================================= */
      body {
        margin: 0;
        overflow: hidden;
        background-color: var(--app-bg);
        font-family: var(--font-mono);
        color: var(--ink);
      }

      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Soft floating panel base (rounded sticker card, soft shadow). */
      .neo-box {
        position: absolute;
        z-index: 10;
        background: var(--surface-primary);
        border: 2px solid color-mix(in srgb, var(--ink) 10%, transparent);
        border-radius: 20px;
        box-shadow: var(--shadow-lg);
      }

      /* Explanation banner — soft card. */
      #explanation-overlay {
        top: 84px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 26px;
        text-align: center;
        width: 85%;
        max-width: 600px;
        pointer-events: none;
        transition: background-color 0.4s, opacity 0.3s;
      }
      #explanation-overlay p {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(0.9rem, 2.2vw, 1.1rem);
        line-height: 1.4;
        font-weight: var(--weight-bold);
        letter-spacing: -0.01em;
        color: var(--ink);
      }

      /* Bottom slider bar — soft card. */
      #controls {
        bottom: 5%;
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        max-width: 600px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 26px;
      }
      .slider-label {
        font-family: var(--font-display);
        font-size: 0.8rem;
        font-weight: var(--weight-bold);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      /* Soft pill range slider. */
      input[type="range"] {
        flex-grow: 1;
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: color-mix(in srgb, var(--ink) 12%, transparent);
        border-radius: 999px;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        height: 24px;
        width: 24px;
        background: var(--accent-secondary);
        border: 3px solid var(--surface-primary);
        cursor: pointer;
        box-shadow: var(--shadow-sm);
        border-radius: 50%;
        transition: transform 0.12s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.12); }
      input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.02); }
      input[type="range"]::-moz-range-thumb {
        height: 24px;
        width: 24px;
        background: var(--accent-secondary);
        border: 3px solid var(--surface-primary);
        cursor: pointer;
        box-shadow: var(--shadow-sm);
        border-radius: 50%;
      }

      /* Floating 3D labels — soft pills (bg colour set inline by JS). */
      #labels-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        pointer-events: none;
      }
      .floating-label {
        position: absolute;
        transform: translate(-50%, -50%);
        background: var(--accent-primary);
        padding: 5px 12px;
        border: none;
        box-shadow: var(--shadow-md);
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 700;
        white-space: nowrap;
        transition: opacity 0.2s ease;
        opacity: 0;
        border-radius: 999px;
      }

      /* Top-right button cluster. */
      #top-buttons {
        position: absolute;
        top: 78px;
        right: 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 100;
      }

      /* Soft pill buttons. */
      .top-btn {
        background: var(--surface-primary);
        color: var(--ink);
        padding: 11px 16px;
        font-family: var(--font-display);
        font-weight: var(--weight-bold);
        font-size: 0.8rem;
        cursor: pointer;
        transition: transform 0.15s var(--ease-bounce, ease), box-shadow 0.15s ease, background 0.15s ease;
        display: flex;
        align-items: center;
        gap: 7px;
        border: 2px solid color-mix(in srgb, var(--ink) 12%, transparent);
        box-shadow: var(--shadow-sm);
        border-radius: 999px;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }
      .top-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
      .top-btn:active { transform: translateY(0); box-shadow: var(--shadow-sm); }

      /* Rotation toggle — accent-success when ON. */
      #rotate-btn.active {
        background: var(--accent-success);
        color: #fff;
        border-color: var(--accent-success);
      }
      #rotate-btn .icon { display: inline-flex; transition: transform 0.3s; }
      #rotate-btn.active .icon { animation: spin-slow 3s linear infinite; }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Modal backdrops. */
      #modal-backdrop,
      #alert-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: rgba(20, 19, 15, 0.45);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        z-index: 101;
      }

      /* Soft dashboard-window modal. */
      .modal-box {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 26px 30px;
        width: 90%;
        max-width: 420px;
        z-index: 102;
        flex-direction: column;
        gap: 18px;
      }
      .modal-box h2 {
        margin: 0 0 6px 0;
        font-family: var(--font-display);
        font-weight: var(--weight-black);
        text-transform: none;
        letter-spacing: -0.01em;
        font-size: 1.4rem;
        color: var(--ink);
        border-bottom: var(--border-subtle);
        padding-bottom: 12px;
      }

      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--font-display);
        font-weight: var(--weight-bold);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 0.82rem;
        color: var(--ink);
      }

      /* Custom dropdown — soft pill. */
      .custom-dropdown {
        position: relative;
        width: 160px;
        font-family: var(--font-mono);
      }
      .dropdown-selected {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 0.95rem;
        background: var(--surface-secondary);
        border: 2px solid color-mix(in srgb, var(--ink) 14%, transparent);
        border-radius: 999px;
        box-shadow: var(--shadow-sm);
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 0.66rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ink);
        cursor: pointer;
        user-select: none;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      .dropdown-selected:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
      .dropdown-options {
        display: none;
        flex-direction: column;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: var(--surface-primary);
        border: 2px solid color-mix(in srgb, var(--ink) 14%, transparent);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        z-index: 103;
        padding: 0.35rem;
        overflow: hidden;
      }
      .dropdown-options.show { display: flex; }
      .dropdown-option {
        padding: 0.5rem 0.9rem;
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 0.66rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ink);
        cursor: pointer;
        border-radius: 999px;
        transition: background 0.1s, transform 0.1s, color 0.1s;
      }
      .dropdown-option:hover {
        background: color-mix(in srgb, var(--accent-secondary) 16%, var(--surface-primary));
        color: var(--accent-secondary);
        transform: translateX(3px);
      }

      /* Soft toggle switch. */
      .neo-switch {
        position: relative;
        display: inline-block;
        width: 48px;
        height: 27px;
      }
      .neo-switch input { opacity: 0; width: 0; height: 0; }
      .neo-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: color-mix(in srgb, var(--ink) 14%, transparent);
        border: 2px solid color-mix(in srgb, var(--ink) 14%, transparent);
        transition: 0.2s;
        border-radius: 999px;
      }
      .neo-slider:before {
        position: absolute;
        content: "";
        height: 19px;
        width: 19px;
        left: 2px;
        bottom: 2px;
        background-color: var(--surface-primary);
        box-shadow: var(--shadow-sm);
        transition: 0.2s;
        border-radius: 50%;
      }
      input:checked + .neo-slider {
        background-color: var(--accent-success);
        border-color: var(--accent-success);
      }
      input:checked + .neo-slider:before { transform: translateX(21px); }

      /* Pill CTA. */
      .btn-action {
        margin-top: 6px;
        background: var(--accent-primary);
        color: var(--ink);
        border: none;
        box-shadow: var(--shadow-md);
        padding: 13px;
        font-family: var(--font-display);
        font-weight: var(--weight-bold);
        font-size: 0.95rem;
        cursor: pointer;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        text-align: center;
        transition: transform 0.15s var(--ease-bounce, ease), box-shadow 0.15s ease;
      }
      .btn-action:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
      .btn-action:active { transform: translateY(0); box-shadow: var(--shadow-sm); }

      #custom-alert { gap: 14px; text-align: center; align-items: center; }
      #custom-alert svg { width: 48px; height: 48px; stroke: var(--accent-secondary); }
      #custom-alert p {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 600;
        color: var(--ink);
        margin: 8px 0;
      }

      /* ---- Mobile ---- */
      @media (max-width: 768px) {
        #explanation-overlay { top: 74px; width: 90%; }
        #explanation-overlay p { font-size: 0.9rem; }
        #controls { padding: 12px 16px; gap: 12px; width: 90%; }
        .slider-label { font-size: 0.72rem; }
        .floating-label { font-size: 0.72rem; padding: 4px 9px; }
        #top-buttons { gap: 7px; top: 72px; }
        .top-btn { padding: 9px 12px; font-size: 0.72rem; }
      }
    </style>
      <link rel="stylesheet" href="/utils/components/sticky-ui.css" />
  </head>

  <body>
    <div id="loader">
      <div id="loader-wrapper">
        <div class="logo-cluster"></div>
        <!-- JS will inject the 3 images here -->
      </div>
      <div class="loader-word"><span>Surface Area</span></div>
      <div class="loader-bar"></div>
    </div>

    <script type="module" src="/utils/auth/login-guard.js"></script>
    <nav class="site-nav" data-nav="main"></nav>

    <div id="labels-container"></div>

    <div id="explanation-overlay" class="neo-box">
      <p id="text-content">Loading Mathematical Proof...</p>
    </div>

    <!-- Grouped top-right buttons -->
    <div id="top-buttons">
      <!-- Rotation toggle — ON by default -->
      <button
        id="rotate-btn"
        class="top-btn active"
        title="Toggle auto-rotation"
      >
        <span class="icon">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </span>
      </button>

      <button id="settings-btn" class="top-btn" title="Open settings">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Settings modal -->
    <div id="modal-backdrop"></div>
    <div id="settings-modal" class="neo-box modal-box">
      <h2>Configuration</h2>

      <div class="setting-row">
        <label>Shape Net</label>
        <div class="custom-dropdown" id="shape-dropdown">
          <div class="dropdown-selected">
            <span id="selected-shape-text">Sphere</span>
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </div>
          <div class="dropdown-options" id="shape-options">
            <div class="dropdown-option" data-value="sphere">Sphere</div>
            <div class="dropdown-option" data-value="cone">Cone</div>
            <div class="dropdown-option" data-value="cylinder">Cylinder</div>
            <div class="dropdown-option" data-value="cube">Cube</div>
            <div class="dropdown-option" data-value="cuboid">Cuboid</div>
          </div>
        </div>
      </div>

      <div class="setting-row">
        <label>Show Area Labels</label>
        <label class="neo-switch">
          <input type="checkbox" id="toggle-labels" checked />
          <span class="neo-slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <label>Explanations</label>
        <label class="neo-switch">
          <input type="checkbox" id="toggle-explanation" checked />
          <span class="neo-slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <label>Multicolor</label>
        <label class="neo-switch">
          <input type="checkbox" id="toggle-colors" checked />
          <span class="neo-slider"></span>
        </label>
      </div>

      <div class="btn-action" id="close-settings">Apply / Close</div>
    </div>

    <!-- Alert modal -->
    <div id="alert-backdrop"></div>
    <div id="custom-alert" class="neo-box modal-box">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <p id="custom-alert-text">Alert message</p>
      <div class="btn-action" id="close-alert" style="width: 100px">OK</div>
    </div>

    <div id="canvas-container"></div>

    <div id="controls" class="neo-box">
      <span class="slider-label">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        3D
      </span>
      <input type="range" id="progress-slider" min="0" max="100" value="0" />
      <span class="slider-label">
        Net
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
      </span>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js",
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
        }
      }
    </script>

    <script src="/utils/components/loader.js"></script>
    <script type="module" src="/utils/components/nav-builder.js"></script>
    <script type="module" src="./index.js"></script>
  </body>
</html>
