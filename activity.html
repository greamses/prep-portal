<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity — PrepPortal</title>
  <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
  <link rel="stylesheet" href="/utils/components/theme.css" />
  <link rel="stylesheet" href="/utils/components/components.css" />
  <link rel="stylesheet" href="/utils/theory-analyser/theory-analyser.css" />
  <!-- Reuse the theory page's exam-paper + video-row styling for an identical answer experience -->
  <link rel="stylesheet" href="/theory-page/style.css" />
  <script type="importmap">
    {
      "imports": {
        "firebase/app":       "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
        "firebase/auth":      "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
        "firebase/storage":   "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
      }
    }
  </script>
  <!-- Premium-only: free users are redirected to /subscribe.html#plans -->
  <script type="module" src="/utils/auth/premium-guard.js"></script>
  <style>
    body { margin:0; background: var(--app-bg); color: var(--ink);
      font-family: var(--font-mono, ui-monospace, monospace); padding: clamp(1rem,4vw,2.5rem) 1rem; }
    .ac-paint { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; opacity:.26; }
    .ac-paint svg { width: 100%; height: 100%; display: block; }
    [data-theme="dark"] .ac-paint { opacity: .15; }
    .ac-wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }
    .ac-head { display:flex; align-items:center; gap:1rem; margin:.5rem 0 1.4rem; flex-wrap:wrap; }
    .ac-head h1 { font-family: var(--font-display); font-weight: var(--weight-black,900);
      font-size: clamp(1.2rem,3.5vw,1.7rem); line-height:1.05; margin:0; }
    .ac-meta { font-size:.7rem; color: var(--text-secondary); margin-top:.2rem; }
    .ac-usage { margin-left:auto; font-size:.62rem; text-transform:uppercase; letter-spacing:.06em;
      color: var(--text-secondary); background: var(--surface-primary); border:2px solid color-mix(in srgb, var(--accent-secondary) 45%, transparent);
      border-radius:999px; padding:.35rem .7rem; }
    /* Paper "sheet" frame around the reused .exam-paper */
    .ac-namerow { margin: 0 0 1rem; }
    .ac-namerow label { display:block; font-size:.62rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em;
      color: var(--text-secondary); margin-bottom:.3rem; }
    .ac-namerow input { width:100%; max-width:340px; box-sizing:border-box; padding:.6rem .8rem; border-radius:12px;
      font-family:"Caveat",cursive; font-size:1.25rem; border:2px solid color-mix(in srgb, var(--ink) 14%, transparent);
      background: var(--surface-primary); color: var(--ink); outline:none; }
    .ac-namerow input:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-primary) 55%, transparent); }
    .ac-paper { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-lg);
      border: 2px solid color-mix(in srgb, var(--ink) 12%, transparent); background: var(--surface-primary); }
    .ac-actions { display:flex; gap:.7rem; align-items:center; margin:1.2rem 0; flex-wrap:wrap; }
    .ac-preview { font-family: var(--font-mono); font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
      color: var(--text-on-accent,#2a2723); background: var(--accent-warning,#f0a868); padding:.3rem .6rem; border-radius:999px; }
    .ac-msg { font-size:.74rem; color: var(--text-secondary); }
    .ac-msg--err { color: var(--accent-danger); }
    .ac-gate { text-align:center; padding:3rem 1rem; color: var(--text-secondary); font-size:.85rem; }
    a { color: var(--accent-secondary); }
  </style>
    <link rel="stylesheet" href="/utils/components/sticky-ui.css" />
  </head>
<body>
  <div class="ac-paint" aria-hidden="true"></div>
  <div class="ac-wrap">
    <div class="ac-head">
      <span class="pp-sticky pp-sticky--c3 pp-sticky--tape" style="--pp-note-tilt:-3deg">Activity</span>
      <div>
        <h1 id="ac-title">Loading…</h1>
        <div class="ac-meta" id="ac-meta"></div>
      </div>
      <span class="ac-usage" id="ac-usage" hidden></span>
    </div>

    <div id="ac-gate" class="ac-gate">Loading activity…</div>

    <form id="ac-form" hidden>
      <div class="ac-namerow">
        <label for="ac-name">Your name</label>
        <input id="ac-name" type="text" maxlength="80" placeholder="Type your name…" autocomplete="name" />
      </div>
      <div class="ac-paper"><div class="exam-paper" id="exam-paper"></div></div>
      <div class="ac-actions">
        <button type="submit" class="pp-btn" id="ac-submit">Submit for marking</button>
        <span class="ac-preview" id="ac-preview" hidden>Preview — not recorded</span>
        <span class="ac-msg" id="ac-msg"></span>
      </div>
    </form>

    <div id="theory-results"></div>

    <p style="max-width:60ch;margin:1.6rem auto 0;text-align:center;font-size:.68rem;line-height:1.6;color:var(--text-secondary)">
      Original, exam-style practice. Prep Portal is not affiliated with or
      endorsed by WAEC, JAMB, NECO or any examination body. To report content,
      email <a href="mailto:eemadanyel@prepportal.com.ng">eemadanyel@prepportal.com.ng</a>.
    </p>
  </div>

  <script type="module" src="/utils/theory-analyser/theory-analyser.js"></script>
  <script type="module">
    import { auth } from "/firebase-init.js";
    import { onAuthStateChanged } from "firebase/auth";
    import { heroPaint } from "/utils/components/nav-icons.js";
    import { state } from "/theory-page/state.js";
    import { handleVideoBtn } from "/theory-page/js/video.js";
    import { initMathJax, initTextFormatting } from "/theory-page/js/ui-helpers.js";

    document.querySelector(".ac-paint").innerHTML = heroPaint();
    // video.js + analyser authenticate backend calls through this hook.
    window._getAuthToken = async () => {
      if (!auth.currentUser) throw new Error("Please sign in.");
      return auth.currentUser.getIdToken();
    };
    try { initMathJax(); } catch (_) {}
    try { initTextFormatting(); } catch (_) {}

    const API = window.location.port === "5500" ? "http://127.0.0.1:5000" : "";
    const params = new URLSearchParams(location.search);
    const slug = (params.get("a") || "").trim();
    const preview = params.get("preview") === "1";
    const $ = (id) => document.getElementById(id);
    const stripHtml = (h) => String(h || "").replace(/<[^>]+>/g, " ").replace(/&nbsp;/g, " ").replace(/\s+/g, " ").trim();
    const attr = (s) => String(s == null ? "" : s).replace(/"/g, "&quot;");
    const escHtml = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    let activity = null;
    async function authHeader() { return { Authorization: "Bearer " + (await auth.currentUser.getIdToken()) }; }

    async function loadUsage() {
      try {
        const r = await fetch(`${API}/api/ai/usage`, { headers: await authHeader() });
        const u = await r.json();
        const el = $("ac-usage"); el.hidden = false;
        el.textContent = `Tokens ${Number(u.used || 0).toLocaleString()}/${Number(u.allocation || 0).toLocaleString()} · 5h`;
      } catch (_) {}
    }

    async function load() {
      if (!slug) { $("ac-gate").textContent = "No activity specified."; return; }
      let res, d;
      try {
        res = await fetch(`${API}/api/activities/${encodeURIComponent(slug)}`, { headers: await authHeader() });
        d = await res.json();
      } catch (e) { $("ac-gate").textContent = "Error: " + e.message; return; }
      if (res.status === 402) { location.href = "/subscribe.html#plans"; return; }
      if (!res.ok || !d.activity) { $("ac-gate").textContent = d.error || "Activity not found."; return; }

      activity = d.activity;
      // Feed the shared state video.js reads (subject/level → channel picks).
      state.st.subject = activity.subject || "General";
      state.st.cls = activity.classLevel || "";

      $("ac-title").textContent = activity.title;
      $("ac-meta").textContent = [activity.subject, activity.classLevel, `by ${activity.ownerName || "teacher"}`].filter(Boolean).join(" · ");
      $("ac-preview").hidden = !preview;
      $("ac-name").value = defaultName();
      renderPaper();
      $("ac-name").oninput = () => { const el = $("ac-paper-name"); if (el) el.textContent = studentName(); };
      $("ac-gate").hidden = true;
      $("ac-form").hidden = false;
      loadUsage();
    }

    function defaultName() {
      return auth.currentUser.displayName || (auth.currentUser.email ? auth.currentUser.email.split("@")[0] : "Student");
    }
    function studentName() {
      const v = ($("ac-name")?.value || "").trim();
      return v || defaultName();
    }

    function renderPaper() {
      const date = new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });
      let html = `
        <div class="paper-hdr">
          <div class="paper-info">
            <span class="paper-field">Name:<span class="paper-field-val" id="ac-paper-name">${escHtml(studentName())}</span></span>
            <span class="paper-field">Subject:<span class="paper-field-val">${escHtml(activity.subject || "")}</span></span>
            <span class="paper-field">Class:<span class="paper-field-val">${escHtml(activity.classLevel || "")}</span></span>
            <span class="paper-field">Date:<span class="paper-field-val">${escHtml(date)}</span></span>
          </div>
        </div>`;
      activity.questions.forEach((q, i) => {
        const marksText = q.marks ? `${q.marks} marks` : "";
        html += `
        <div class="paper-q-block" data-qidx="${i}">
          <div class="paper-q-label">
            <span class="paper-q-num">Question ${i + 1}</span>
            ${q.compulsory ? `<span class="paper-q-compulsory">★ Compulsory</span>` : `<span class="paper-field">Optional</span>`}
            ${marksText ? `<span style="margin-left:auto" class="paper-field">${escHtml(marksText)}</span>` : ""}
          </div>
          <div class="paper-q-text">${q.text}</div>
          <div class="paper-q-prompt">Answer:</div>
          <div class="paper-editable" id="editor-${i}" contenteditable="true" data-qidx="${i}"
               data-placeholder="Write your answer here…" spellcheck="true"></div>
          <div class="paper-video-row" id="video-row-${i}">
            <button class="paper-video-btn" data-qidx="${i}" data-qtext="${attr(stripHtml(q.text))}" type="button">▶ Watch Video</button>
          </div>
        </div>`;
      });
      const paper = $("exam-paper");
      paper.innerHTML = html;
      paper.querySelectorAll(".paper-video-btn").forEach((b) => b.addEventListener("click", () => handleVideoBtn(b)));
      setTimeout(() => {
        if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([paper]).catch(() => {});
      }, 150);
    }

    $("ac-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("ac-submit"), msg = $("ac-msg");
      const eds = [...document.querySelectorAll(".paper-editable")];
      const answers = eds.map((ed) => ed.innerHTML.trim());
      if (answers.every((a) => stripHtml(a).length < 2)) { msg.textContent = "Write your answers first."; msg.className = "ac-msg ac-msg--err"; return; }

      btn.disabled = true; msg.textContent = "Marking…"; msg.className = "ac-msg";
      try {
        const TA = window.TheoryAnalyser;
        TA.init({ geminiKey: "backend", subject: activity.subject || "General", level: activity.classLevel || "JSS", mountId: "theory-results" });
        const questions = activity.questions.map((q) => ({ text: stripHtml(q.text), marks: q.marks, compulsory: q.compulsory }));
        const r = await TA.analyseAll(questions, answers, studentName(), new Date().toLocaleDateString("en-NG"));
        if (!r) { msg.textContent = "Marking failed — see the message above."; msg.className = "ac-msg ac-msg--err"; btn.disabled = false; return; }
        const score = r.combined?.totalScore ?? null;
        const totalMarks = r.combined?.totalMax ?? null;
        loadUsage();

        if (preview) {
          msg.textContent = "Preview — submission was not recorded.";
        } else {
          await fetch(`${API}/api/activities/${encodeURIComponent(slug)}/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...(await authHeader()) },
            body: JSON.stringify({ answers: answers.map((t) => ({ text: t })), marked: r.combined, score, totalMarks, studentName: studentName() }),
          });
          msg.textContent = `Submitted${score != null ? ` — ${score}/${totalMarks}` : ""}. Your teacher can see your result.`;
          eds.forEach((ed) => (ed.contentEditable = "false"));
          btn.style.display = "none";
        }
      } catch (err) {
        msg.textContent = err.message; msg.className = "ac-msg ac-msg--err"; btn.disabled = false;
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) { $("ac-gate").innerHTML = 'Please <a href="/index.html?login=1&next=' + encodeURIComponent(location.pathname + location.search) + '">sign in</a> to open this activity.'; return; }
      load();
    });
  </script>
</body>
</html>
