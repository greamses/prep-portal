<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Prep Portal 2026 | Archives</title>
    <meta
      name="description"
      content="Study guides and revision articles across science, math and the humanities — curated by Prep Portal to support WAEC, NECO, JAMB and Cambridge exam prep."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />

    <meta name="author" content="Prep Portal" />

    <link rel="stylesheet" href="/blogs/css/render.css" />
    <link rel="stylesheet" href="/blogs/css/blog.css" />
    <link rel="stylesheet" href="/utils/components/nav.css" />

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
        }
      }
    </script>
      <link rel="stylesheet" href="/utils/components/sticky-ui.css" />
  </head>

  <body>
    <div id="loader">
      <div id="loader-wrapper">
        <div class="logo-cluster"></div>
      </div>
      <!-- Changed to support dynamic subject naming during loading -->
      <div class="loader-word"><span id="loaderSubject">Science</span></div>
      <div class="loader-bar"></div>
    </div>

    <script>
      // Immediately run loader customization to prevent text-flash mismatch
      (function () {
        const params = new URLSearchParams(window.location.search);
        const sub = params.get("s") || params.get("subject") || "science";
        const formatted =
          sub.charAt(0).toUpperCase() + sub.slice(1).toLowerCase();
        const loaderLabel = document.getElementById("loaderSubject");
        if (loaderLabel) loaderLabel.textContent = formatted;
      })();
    </script>

    <nav class="site-nav" data-nav="main"></nav>

    <div class="hero">
      <div class="hero-left">
        <h1 class="hero-title"></h1>
      </div>
      <div class="hero-right">
        <p class="hero-tagline"></p>
      </div>
    </div>

    <div class="science-container">
      <div class="filter-bar">
        <div class="filter-search-row">
          <div class="search-wrapper">
            <svg
              class="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              class="search-input"
              id="searchInput"
              placeholder="Search topics..."
            />
          </div>
        </div>

        <div class="filter-dropdowns-row">
          <div class="pp-select pp-select--filter" id="subjectDropdown">
            <button class="pp-select-trigger" id="subjectDropdownBtn">
              <span id="subjectFilterText">All Subjects</span>
              <svg
                class="pp-select-chevron"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div class="pp-select-menu" id="subjectDropdownMenu">
              <!-- Dynamically populated -->
            </div>
          </div>

          <div class="pp-select pp-select--filter" id="classDropdown">
            <button class="pp-select-trigger" id="classDropdownBtn">
              <span id="classFilterText">All Classes</span>
              <svg
                class="pp-select-chevron"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div class="pp-select-menu" id="classDropdownMenu">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
      </div>

      <div id="scienceGrid" class="science-grid">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          Loading posts...
        </div>
      </div>
    </div>

    <div id="singlePostView" class="single-post-view">
      <button class="close-post" id="closePostBtn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        Close
      </button>
      <div id="singlePostContent" class="single-post-content"></div>
    </div>

    <button
      class="scroll-top"
      id="scrollTop"
      title="Scroll to top"
      aria-label="Scroll to top"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <div class="toast" id="toast"></div>

    <div class="embed-overlay" id="embedOverlay">
      <div class="embed-box">
        <div class="embed-header">
          <span class="embed-title" id="embedTitle">Loading...</span>
          <div class="embed-actions">
            <a
              class="embed-open-btn"
              id="embedOpenLink"
              href="#"
              target="_blank"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                ></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
              </svg>
              Open in browser
            </a>
            <button class="embed-close-btn" id="embedCloseBtn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
              Close
            </button>
          </div>
        </div>
        <div class="embed-frame-wrap" id="embedFrameWrap">
          <div class="embed-spinner" id="embedSpinner">
            <div class="spinner-ring"></div>
            Loading...
          </div>
          <iframe id="embedFrame" title="Embedded resource"></iframe>
        </div>
      </div>
    </div>

    <script src="/utils/components/loader.js"></script>
    <script src="/utils/components/nav-builder.js" type="module"></script>
    <script src="/blogs/js/blog.js" type="module"></script>
  </body>
</html>
