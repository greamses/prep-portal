<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prep Portal | Grammar Police</title>

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 98L10 75V25L50 2L90 25V75L50 98Z' fill='%230a0a0a' fill-opacity='0.1' /%3E%3Cpath d='M50 50L10 27V73L50 96V50Z' fill='%230055ff' stroke='%230a0a0a' stroke-width='2.5' /%3E%3Cpath d='M50 50L90 27V73L50 96V50Z' fill='%23003db3' stroke='%230a0a0a' stroke-width='2.5' /%3E%3Cpath d='M50 50L90 27L50 4L10 27L50 50Z' fill='%23ffffff' stroke='%230a0a0a' stroke-width='2.5' /%3E%3Cpath d='M50 35L65 43V58L50 66L35 58V43L50 35Z' fill='%23ffe500' stroke='%230a0a0a' stroke-width='2' /%3E%3Ccircle cx='50' cy='50.5' r='4' fill='%230a0a0a' /%3E%3C/svg%3E"
    />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/utils/components/nav.css" />
    <link rel="stylesheet" href="/utils/components/select.css" />
    <link rel="stylesheet" href="./css/shelf.css" />
    <link rel="stylesheet" href="./css/modal.css" />
    <link rel="stylesheet" href="./css/book-pages.css" />
    <link rel="stylesheet" href="./css/book-explanation.css" />
    <link rel="stylesheet" href="./css/book-practice.css" />
    <!-- McGraw-Hill / Glencoe editorial layer — loaded last so it wins -->
    <link rel="stylesheet" href="./css/mcgraw.css" />

    <style>
      body {
        visibility: hidden;
      }
    </style>

    <!-- StPageFlip — modern page-flip library, no jQuery needed -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
        }
      }
    </script>
  </head>

  <body>
    <div id="loader">
      <div id="loader-wrapper"><div class="logo-cluster"></div></div>
      <div class="loader-word"><span>Grammar</span></div>
      <div class="loader-bar"></div>
    </div>

    <nav class="site-nav" data-nav="main"></nav>

    <!-- ═══ LANDING PAGE ═══ -->
    <div class="gp-landing">
      <div class="shelf-scene">
        <header class="shelf-header">
          <p class="shelf-eyebrow">Prep Portal · English</p>
          <h1 class="shelf-title">English<br />Workbooks</h1>
          <p class="shelf-subtitle">
            Interactive books — read, learn, and practise.
          </p>
        </header>

        <div class="shelf-row" role="list">
          <!-- Grammar Police book -->
          <button
            class="shelf-book"
            id="gpOpen"
            role="listitem"
            aria-label="Open Grammar Police and Punctuation Patrol book"
          >
            <div class="shelf-book-cover">
              <div class="cover-pattern" aria-hidden="true"></div>
              <div class="cover-front">
                <svg
                  class="cover-badge"
                  viewBox="0 0 64 64"
                  fill="none"
                  width="44"
                  height="44"
                >
                  <path
                    d="M32 4L6 17V38C6 51 17 62 32 64C47 62 58 51 58 38V17L32 4Z"
                    fill="rgba(255,229,0,0.2)"
                    stroke="#ffe500"
                    stroke-width="2.5"
                  />
                  <path
                    d="M22 33L29 40L42 26"
                    stroke="#ffe500"
                    stroke-width="3.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <p class="cover-title">Grammar<br />Police</p>
                <p class="cover-pp">+ Punctuation</p>
              </div>
            </div>
            <div class="shelf-book-spine" aria-hidden="true">
              <span class="spine-text">Grammar Police</span>
            </div>
            <p class="shelf-book-label">Grammar &amp; Punctuation</p>
          </button>

          <!-- Empty slot 1 -->
          <div
            class="shelf-book shelf-book--empty"
            role="listitem"
            aria-label="Coming soon"
          >
            <div class="shelf-book-cover shelf-book-cover--empty">
              <span class="empty-soon">Soon</span>
            </div>
            <div class="shelf-book-spine" aria-hidden="true"></div>
            <p class="shelf-book-label">Coming Soon</p>
          </div>

          <!-- Empty slot 2 -->
          <div
            class="shelf-book shelf-book--empty"
            role="listitem"
            aria-label="Coming soon"
          >
            <div class="shelf-book-cover shelf-book-cover--empty">
              <span class="empty-soon">Soon</span>
            </div>
            <div class="shelf-book-spine" aria-hidden="true"></div>
            <p class="shelf-book-label">Coming Soon</p>
          </div>
        </div>

        <div class="shelf-plank" aria-hidden="true"></div>

        <p class="shelf-hint">Click a book to open it</p>
      </div>
    </div>

    <!-- ═══ FULL-SCREEN BOOK MODAL ═══ -->
    <div
      id="gpModal"
      class="gp-modal"
      role="dialog"
      aria-modal="true"
      aria-label="Grammar Police book"
      hidden
    >
      <button class="gp-modal-close" id="gpClose" aria-label="Close book">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          width="20"
          height="20"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>

      <div class="gp-stage">
        <button
          class="gp-nav-btn gp-nav-btn--prev"
          id="gpPrev"
          aria-label="Previous page"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            width="22"
            height="22"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>

        <!-- StPageFlip mounts here — populated by JS -->
        <div id="gpBookClip">
          <div id="gpBook"></div>
        </div>

        <button
          class="gp-nav-btn gp-nav-btn--next"
          id="gpNext"
          aria-label="Next page"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            width="22"
            height="22"
          >
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>

      <div class="gp-modal-footer">
        <span class="gp-page-num" id="gpPageNum"></span>
      </div>
    </div>

    <script src="/utils/components/loader.js"></script>
    <script src="/utils/components/nav-builder.js" type="module"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
