<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="msapplication-navbutton-color" content="#0b0d10" />
    <title>FPV Free Throw — Realistic Basketball</title>
    <meta
      name="description"
      content="A realistic first-person basketball free throw game with analog aim, power meter, and shoot button. Built with Three.js."
    />
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
    <link rel="canonical" href="/" />
    <meta property="og:title" content="FPV Free Throw — Realistic Basketball" />
    <meta
      property="og:description"
      content="First-person basketball free throw with analog aim, power meter, and shoot button."
    />
    <meta property="og:type" content="website" />

    <!-- Site design system — provides CSS vars + Unbounded/JetBrains Mono fonts -->
    <link rel="stylesheet" href="../../../../utils/components/theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/utils/auth/premium-guard.js"></script>
  </head>

  <body>
    <!-- Loading screen — shown immediately, hidden after first Three.js frame -->
    <div id="loader">
      <div class="loader-inner">
        <div class="loader-ball-scene">
          <div class="loader-ball-wrap">
            <svg class="loader-ball-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="bg" cx="38%" cy="30%" r="60%">
                  <stop offset="0%" stop-color="#ff9a3c"/>
                  <stop offset="45%" stop-color="#e05818"/>
                  <stop offset="100%" stop-color="#a03008"/>
                </radialGradient>
                <clipPath id="bc"><circle cx="40" cy="40" r="37"/></clipPath>
              </defs>
              <circle cx="40" cy="40" r="37" fill="url(#bg)"/>
              <g clip-path="url(#bc)" stroke="#160800" stroke-width="2.8" fill="none" stroke-linecap="round">
                <line x1="3" y1="40" x2="77" y2="40"/>
                <path d="M40,3 C16,14 16,66 40,77"/>
                <path d="M40,3 C64,14 64,66 40,77"/>
              </g>
              <ellipse cx="27" cy="25" rx="11" ry="7" fill="rgba(255,255,255,0.13)" transform="rotate(-25 27 25)"/>
            </svg>
          </div>
          <div class="loader-ball-shadow"></div>
        </div>
        <h1 class="loader-title">FPV FREE THROW</h1>
        <p class="loader-sub">REALISTIC BASKETBALL</p>
        <div class="loader-bar-bg">
          <div id="loader-bar" class="loader-bar-fill"></div>
        </div>
        <p id="loader-status" class="loader-status">LOADING...</p>
      </div>
    </div>

    <div id="app">
      <canvas id="scene"></canvas>

      <header class="hud-top">
        <div class="hud-card">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-card">
          <span class="hud-label">SHOTS</span>
          <span id="shots" class="hud-value">0 / 0</span>
        </div>
        <div class="hud-card">
          <span class="hud-label">STREAK</span>
          <span id="streak" class="hud-value">0</span>
        </div>
      </header>

      <div id="message" class="message" aria-live="polite"></div>

      <div id="stick" class="stick" aria-label="Aim stick">
        <div id="stick-knob" class="stick-knob"></div>
      </div>

      <div class="right-controls">
        <div class="power-meter" aria-label="Power meter">
          <div id="power-fill" class="power-fill"></div>
          <div class="power-target"></div>
          <div class="power-target-label">SWEET</div>
          <span class="power-label">POWER</span>
        </div>
        <button id="shoot-btn" class="shoot-btn" aria-label="Shoot">
          <span></span>
        </button>
      </div>

      <div class="hint" id="hint">
        Drag the left stick to aim · Hold SHOOT to charge · Release to fire
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
