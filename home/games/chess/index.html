<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="msapplication-navbutton-color" content="#0b0d10" />
    <title>Grand Chess — Realistic 3D Chess</title>
    <meta
      name="description"
      content="A realistic 3D chess game built with Three.js. Hand-modelled wooden pieces, full legal moves, check, castling, en passant and promotion."
    />
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
    <link rel="canonical" href="/" />
    <meta property="og:title" content="Grand Chess — Realistic 3D Chess" />
    <meta
      property="og:description"
      content="Realistic 3D chess with hand-modelled wooden pieces and full rules. Built with Three.js."
    />
    <meta property="og:type" content="website" />

    <!-- Site design system — provides CSS vars + fonts -->
    <link rel="stylesheet" href="../../../utils/components/theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <!-- Loading screen — hidden after the first rendered frame -->
    <div id="loader">
      <div class="loader-inner">
        <div class="loader-king" aria-hidden="true">
          <svg viewBox="0 0 64 96" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lk" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f6ead2" />
                <stop offset="100%" stop-color="#caa97a" />
              </linearGradient>
            </defs>
            <g fill="url(#lk)" stroke="#3a2c1a" stroke-width="2" stroke-linejoin="round">
              <path d="M28 6h8v6h6v8h-6v6h-8v-6h-6v-8h6z" />
              <path d="M20 34c0 8 4 12 12 12s12-4 12-12z" />
              <path d="M22 46h20l-3 28H25z" />
              <path d="M16 74h32v8H16z" />
            </g>
          </svg>
        </div>
        <h1 class="loader-title">GRAND CHESS</h1>
        <p class="loader-sub">REALISTIC 3D</p>
        <div class="loader-bar-bg">
          <div id="loader-bar" class="loader-bar-fill"></div>
        </div>
        <p id="loader-status" class="loader-status">CARVING THE PIECES…</p>
      </div>
    </div>

    <div id="app">
      <canvas id="scene"></canvas>

      <header class="hud-top">
        <div class="turn-card" id="turn-card">
          <span class="turn-dot" id="turn-dot"></span>
          <span class="turn-text" id="turn-text">White to move</span>
        </div>
        <div class="status-pill" id="status-pill" hidden></div>
      </header>

      <aside class="captured captured--top" aria-label="Captured white pieces">
        <span class="captured-label">Captured</span>
        <div class="captured-row" id="captured-white"></div>
      </aside>
      <aside class="captured captured--bottom" aria-label="Captured black pieces">
        <span class="captured-label">Captured</span>
        <div class="captured-row" id="captured-black"></div>
      </aside>

      <div class="controls-bar">
        <button class="ctrl-btn" id="btn-ai" title="Toggle computer opponent (cycles difficulty)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="2"/><path d="M9 7V4h6v3"/><circle cx="9" cy="13" r="1.2" fill="currentColor"/><circle cx="15" cy="13" r="1.2" fill="currentColor"/><path d="M2 12h2M20 12h2"/></svg>
          <span id="ai-label">2 Players</span>
        </button>
        <button class="ctrl-btn" id="btn-fullscreen" title="Toggle fullscreen">
          <svg id="fs-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M16 21h3a2 2 0 0 0 2-2v-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
          <svg id="fs-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M3 8h3a2 2 0 0 0 2-2V3M21 8h-3a2 2 0 0 1-2-2V3M21 16h-3a2 2 0 0 0-2 2v3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
          <span id="fs-label">Fullscreen</span>
        </button>
        <button class="ctrl-btn" id="btn-undo" title="Undo last move">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg>
          <span>Undo</span>
        </button>
        <button class="ctrl-btn" id="btn-flip" title="Flip camera to other side">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
          <span>Flip</span>
        </button>
        <button class="ctrl-btn ctrl-btn--danger" id="btn-new" title="Start a new game">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12a7 7 0 1 1 2 4.9"/><path d="M5 21v-5h5"/></svg>
          <span>New</span>
        </button>
      </div>

      <div class="hint" id="hint">
        Tap a piece to select · tap a highlighted square to move · drag to orbit
      </div>
    </div>

    <!-- Promotion picker -->
    <div class="promo" id="promo" hidden>
      <div class="promo-card">
        <h2>Promote pawn</h2>
        <div class="promo-options" id="promo-options"></div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
