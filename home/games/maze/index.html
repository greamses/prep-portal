<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />
    <title>Prep Portal 2026 | 3D Maze</title>
    <meta name="theme-color" content="#0055ff" />
    <meta
      name="description"
      content="Find your way out of a randomly generated 3D maze. Walk in first person with WASD and the mouse, and reach the glowing exit."
    />

    <!-- Shared theme + nav -->
    <link rel="stylesheet" href="/home/css/main.css" />
    <link rel="stylesheet" href="/utils/components/nav.css" />

    <!-- Techy monospace for the maze UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Oswald:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/home/games/maze/css/game.css" />

    <!-- Firebase import map (the shared nav imports /firebase-init.js) -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
        }
      }
    </script>
    <!-- Babylon.js is fetched with download progress by js/main.js so the load
         screen can show a real percentage. -->
  </head>

  <body>
    <nav class="site-nav" data-nav="main"></nav>

    <main class="maze-page">
      <div class="maze-stage">
        <canvas
          id="maze-canvas"
          class="maze-canvas"
          touch-action="none"
        ></canvas>

        <div class="maze-hud">
          <span class="maze-title">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 3h18v18H3zM3 9h6M15 9h6M9 3v6M9 15v6M9 9h6v6" />
            </svg>
            3D Maze
          </span>
          <div class="maze-hud-actions">
            <button type="button" id="maze-new" class="maze-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
                <path d="M3 3v5h5" />
              </svg>
              New maze
            </button>
            <button
              type="button"
              id="maze-fs"
              class="maze-btn maze-btn--icon"
              title="Fullscreen"
              aria-label="Toggle fullscreen"
            >
              <svg
                class="mz-fs-enter"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
              </svg>
              <svg
                class="mz-fs-exit"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
                hidden
              >
                <path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" />
              </svg>
            </button>
          </div>
        </div>

        <div class="maze-hint" id="maze-hint" hidden></div>

        <!-- grace-period countdown / "hunters active" flash -->
        <div class="maze-grace" id="maze-grace" hidden></div>

        <!-- Minimap (top-down view of the maze, player + exit) -->
        <canvas
          id="maze-map"
          class="maze-map"
          width="156"
          height="156"
          aria-label="Maze map"
        ></canvas>

        <!-- Analog movement stick (reuses the studio joystick design) -->
        <div class="mz-joy" id="mz-joy" aria-hidden="true">
          <div id="mz-joy-ring" class="mz-joy-ring">
            <span class="mz-joy-dish" aria-hidden="true"></span>
            <div id="mz-joy-knob" class="mz-joy-knob">
              <span class="mz-joy-knob-cap"></span>
            </div>
          </div>
        </div>

        <div class="mz-result mz-result--win" id="maze-win" hidden>
          <div class="mz-result-inner">
            <div class="mz-rule mz-rule--top"><i></i><i></i></div>
            <div class="mz-result-text">
              <h2>VICTORY</h2>
              <p>You reached the exit</p>
            </div>
            <div class="mz-rule mz-rule--bottom"><i></i><i></i></div>
            <button type="button" id="maze-again" class="maze-btn mz-result-btn">
              Play again
            </button>
          </div>
        </div>

        <!-- riddle gate (ancient wooden panel) -->
        <div class="maze-riddle" id="maze-riddle" hidden>
          <div class="mz-riddle-card">
            <div class="mz-riddle-tag">⚜ LOCKED GATE ⚜</div>
            <p class="mz-riddle-q" id="mz-riddle-q"></p>
            <div class="mz-riddle-row">
              <input type="text" id="mz-riddle-input" class="mz-riddle-input" placeholder="speak your answer…" autocomplete="off" autocapitalize="off" spellcheck="false" />
              <button type="button" class="mz-riddle-go" id="mz-riddle-go">OPEN</button>
            </div>
            <p class="mz-riddle-fb" id="mz-riddle-fb"></p>
          </div>
        </div>

        <div class="mz-result mz-result--lose" id="maze-lose" hidden>
          <div class="mz-result-inner">
            <div class="mz-rule mz-rule--top"><i></i><i></i></div>
            <div class="mz-result-text">
              <h2>DEFEAT</h2>
              <p>A hunter caught you</p>
            </div>
            <div class="mz-rule mz-rule--bottom"><i></i><i></i></div>
            <button type="button" id="maze-retry" class="maze-btn mz-result-btn">
              Try again
            </button>
          </div>
        </div>

        <!-- Game load screen — terminal boot style -->
        <div class="maze-loader" id="maze-loader">
          <div class="maze-loader-card">
            <div class="mz-rule mz-rule--top"><i></i><i></i></div>
            <div class="mz-load-head">
              <span class="mz-load-tag">SYS</span>
              <span class="mz-load-title">MAZE RUNNER</span>
              <span class="mz-load-blink">_</span>
            </div>
            <div class="mz-rule mz-rule--bottom"><i></i><i></i></div>

            <div class="mz-bar" id="mz-bar" aria-hidden="true"></div>
            <div class="mz-load-status">
              <span id="maze-loader-pct">00%</span>
              <span class="mz-load-sep">//</span>
              <span id="maze-loader-status">booting…</span>
            </div>

            <div class="mz-log" id="mz-log" aria-hidden="true"></div>

            <div class="mz-controls">
              <div class="mz-controls-h">// CONTROLS</div>
              <ul>
                <li><b>WASD / STICK</b><span>move</span></li>
                <li><b>DRAG</b><span>turn the camera</span></li>
                <li><b>SHIFT</b><span>run</span></li>
                <li><b>FIND</b><span>the green exit</span></li>
                <li><b>AVOID</b><span>the red hunters</span></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/home/games/maze/js/main.js"></script>
    <script type="module" src="/utils/components/nav-builder.js"></script>
  </body>
</html>
