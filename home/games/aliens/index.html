<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Alien Angle — Angular Targeting</title>
    <meta
      name="description"
      content="Shoot hidden alien saucers using their angular position. Read the protractor, aim the cannon, fire."
    />
    <link rel="icon" type="image/svg+xml" href="/logo/logo-light.svg" />

    <link rel="stylesheet" href="../../../utils/components/theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./alien-angle.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <!-- Loading screen: radar / targeting boot-up -->
    <div id="loader">
      <div class="loader-inner">
        <div class="radar">
          <svg class="radar-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="rgba(120,225,255,0.30)" stroke-width="1">
              <circle cx="100" cy="100" r="92" />
              <circle cx="100" cy="100" r="62" />
              <circle cx="100" cy="100" r="32" />
              <line x1="8" y1="100" x2="192" y2="100" />
              <line x1="100" y1="8" x2="100" y2="192" />
            </g>
            <path d="M16 100 A84 84 0 0 1 184 100" fill="none" stroke="rgba(150,235,255,0.8)" stroke-width="2.5" />
            <g stroke="rgba(150,235,255,0.7)" stroke-width="1.6">
              <line x1="184" y1="100" x2="172" y2="100" />
              <line x1="173" y1="58" x2="163" y2="63" />
              <line x1="142" y1="27" x2="136" y2="36" />
              <line x1="100" y1="16" x2="100" y2="28" />
              <line x1="58" y1="27" x2="64" y2="36" />
              <line x1="27" y1="58" x2="37" y2="63" />
              <line x1="16" y1="100" x2="28" y2="100" />
            </g>
            <text x="100" y="12" fill="rgba(200,245,255,0.9)" font-size="11" font-family="JetBrains Mono, monospace" text-anchor="middle">90</text>
          </svg>
          <div class="radar-sweep"></div>
          <span class="radar-blip" style="--bx: 64%; --by: 30%; --d: 0s"></span>
          <span class="radar-blip" style="--bx: 30%; --by: 58%; --d: 0.7s"></span>
          <span class="radar-blip" style="--bx: 72%; --by: 64%; --d: 1.3s"></span>
          <div class="radar-core"></div>
        </div>
        <h1 class="loader-title">ALIEN ANGLE</h1>
        <p class="loader-sub">ANGULAR TARGETING SYSTEM</p>
        <div class="loader-bar-bg"><div id="loader-bar" class="loader-bar-fill"></div></div>
        <p id="loader-status" class="loader-status">CALIBRATING PROTRACTOR…</p>
      </div>
    </div>

    <div id="app">
      <canvas id="scene"></canvas>

      <!-- top-left score cards -->
      <header class="hud-top">
        <div class="hud-card">
          <span class="hud-label">SCORE</span><span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-card">
          <span class="hud-label">HITS</span><span id="shots" class="hud-value">0 / 0</span>
        </div>
        <div class="hud-card">
          <span class="hud-label">ACC</span><span id="accuracy" class="hud-value">0%</span>
        </div>
      </header>

      <!-- live aim readout (shown only with the protractor) -->
      <div id="current-wrap" class="current-wrap">
        <span class="current-label">YOUR AIM</span>
        <span id="current-angle" class="current-value">90°</span>
      </div>

      <div id="message" class="message" aria-live="polite"></div>

      <!-- fullscreen -->
      <button id="fullscreen-btn" class="fs-btn" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24">
          <path d="M8 3H5a2 2 0 0 0-2 2v3" />
          <path d="M16 3h3a2 2 0 0 1 2 2v3" />
          <path d="M8 21H5a2 2 0 0 1-2-2v-3" />
          <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
        </svg>
      </button>

      <!-- settings -->
      <button id="gear-btn" class="gear-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
      <div id="settings-panel" class="settings-panel">
        <div class="set-row">
          <span class="set-title">Difficulty</span>
          <div class="seg">
            <button data-diff="easy" class="active">Easy</button>
            <button data-diff="medium">Med</button>
            <button data-diff="hard">Hard</button>
          </div>
        </div>
        <label class="set-check">
          <input type="checkbox" id="set-protractor" />
          <span>Show protractor</span>
        </label>
        <label class="set-check">
          <input type="checkbox" id="set-sound" checked />
          <span>Sound effects</span>
        </label>
        <label class="set-check">
          <input type="checkbox" id="set-music" checked />
          <span>Music</span>
        </label>
      </div>

      <!-- angle dial -->
      <div id="stick" class="stick" aria-label="Angle dial">
        <div class="stick-track"></div>
        <div id="stick-knob" class="stick-knob"></div>
      </div>

      <!-- fire -->
      <div class="right-controls">
        <button id="shoot-btn" class="shoot-btn" aria-label="Fire"><span>FIRE</span></button>
      </div>

      <div class="hint" id="hint">
        Spin the dial to the target angle · Tap FIRE
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
